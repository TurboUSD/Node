; platformio.ini — TurboUSD Node firmware (ESP32-S3 side)
; Target board: SenseCAP Indicator D1 (ESP32-S3 + RP2040 dual-MCU)
;
; Build with: pio run
; Flash with: pio run --target upload
; Serial monitor: pio device monitor

[env:sensecap_indicator_d1]
; espressif32 >= 6.x ships Arduino-ESP32 3.x (ESP-IDF 5.x), which is
; required for esp_lcd_new_rgb_panel() used in initDisplayAndTouch().
; Do NOT downgrade below 6.0.0 — IDF 4.4.x does not expose that API.
platform = espressif32@^6.0.0
board = esp32-s3-devkitc-1   ; closest generic profile; real pin mapping is
                              ; in include/board_pins.h (verified against
                              ; Seeed's reference firmware schematic).
framework = arduino

; PlatformIO only compiles src/ by default -- assets/turbousd_logo.c lives
; outside that, so it's added explicitly here rather than moved into src/
; (keeping generated assets visually separate from hand-written code).
build_src_filter = +<*> +<../assets/turbousd_logo.c>

; --- Partition scheme: required for OTA. This reserves two roughly-equal
; app partitions (ota_0 / ota_1) so the device can download a new firmware
; image into the inactive one while still running from the active one.
board_build.partitions = default_ota.csv

; --- PSRAM: ESP32-S3 on the D1 has 8 MB octal PSRAM (OPI mode).
; The RGB framebuffer (480×480×2 = ~450 KB) lives here.
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D FIRMWARE_VERSION=\"0.1.0\"
    -D BOARD_HAS_PSRAM           ; enables PSRAM heap in Arduino-ESP32
    -D CONFIG_SPIRAM_USE_MALLOC  ; lets malloc() spill into PSRAM

lib_deps =
    lvgl/lvgl @ ^8.3.11
    bblanchon/ArduinoJson @ ^7.0.4
    knolleary/PubSubClient @ ^2.8     ; placeholder if we later add MQTT for realtime mining pushes
    ricmoo/QRCode @ ^0.0.1            ; backs LVGL's lv_qrcode widget (see ui/modal.h's addQrCode()) -- confirm this is the exact library variant your installed LVGL version's lv_qrcode.c expects; LVGL's docs reference nayuki's QR-Code-generator specifically, double-check compatibility if the build fails on qrcodegen symbols
