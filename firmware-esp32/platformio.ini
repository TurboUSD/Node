; platformio.ini — TurboUSD Node firmware (ESP32-S3 side)
; Target board: SenseCAP Indicator D1 (ESP32-S3 + RP2040 dual-MCU)
;
; Build with: pio run
; Flash with: pio run --target upload
; Serial monitor: pio device monitor

[env:sensecap_indicator_d1]
; espressif32 >= 6.x ships Arduino-ESP32 3.x (ESP-IDF 5.x), which is
; required for esp_lcd_new_rgb_panel() used in initDisplayAndTouch().
; Do NOT downgrade below 6.0.0 — IDF 4.4.x does not expose that API.
platform = espressif32@^6.0.0
board = esp32-s3-devkitc-1   ; closest generic profile; real pin mapping is
                              ; in include/board_pins.h (verified against
                              ; Seeed's reference firmware schematic).
framework = arduino

; PlatformIO only compiles src/ by default -- assets/turbousd_logo.c lives
; outside that, so it's added explicitly here rather than moved into src/
; (keeping generated assets visually separate from hand-written code).
build_src_filter = +<*> +<../assets/turbousd_logo.c>

; --- Partition scheme: custom CSV in this repo (8 MB flash, two OTA slots).
; default_ota.csv does NOT ship with espressif32@^6.0.0, so we include our
; own copy at firmware-esp32/partitions.csv.
board_build.partitions = partitions.csv

; --- PSRAM: ESP32-S3 on the D1 has 8 MB octal PSRAM (OPI mode).
; The RGB framebuffer (480×480×2 = ~450 KB) lives here.
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi

monitor_speed = 115200
upload_speed = 921600

; Arduino-ESP32 framework injects -std=gnu++11 by default. Without
; build_unflags, it overrides our -std=c++17 (last flag wins in GCC).
build_unflags = -std=gnu++11

build_flags =
    -std=gnu++17                    ; required for inline static member initializers (screen_tickers.h)
    -I include                      ; explicitly add firmware-esp32/include/ to GCC search path so
                                    ; LVGL library files can find lv_conf.h when compiling
    -D CORE_DEBUG_LEVEL=3
    -D FIRMWARE_VERSION=\"0.1.0\"
    -D BOARD_HAS_PSRAM              ; enables PSRAM heap in Arduino-ESP32
    -D CONFIG_SPIRAM_USE_MALLOC     ; lets malloc() spill into PSRAM
    -D LV_CONF_INCLUDE_SIMPLE       ; makes LVGL do #include "lv_conf.h" via normal include path
    ; Belt-and-suspenders: define critical LVGL options directly so they reach
    ; LVGL library source files even if lv_conf.h include resolution fails.
    -D LV_USE_QRCODE=1
    -D LV_USE_KEYBOARD=1
    -D LV_USE_TEXTAREA=1
    -D LV_USE_TILEVIEW=1
    -D LV_USE_FLEX=1
    -D LV_USE_CHART=1
    -D LV_COLOR_DEPTH=16
    -D LV_MEM_CUSTOM=1
    -D LV_FONT_MONTSERRAT_10=1
    -D LV_FONT_MONTSERRAT_12=1
    -D LV_FONT_MONTSERRAT_14=1
    -D LV_FONT_MONTSERRAT_16=1
    -D LV_FONT_MONTSERRAT_20=1
    -D LV_FONT_MONTSERRAT_32=1
    -D LV_FONT_MONTSERRAT_48=1

lib_deps =
    lvgl/lvgl @ ^8.3.11
    bblanchon/ArduinoJson @ ^7.0.4
    knolleary/PubSubClient @ ^2.8     ; placeholder if we later add MQTT for realtime mining pushes
    ; NOTE: No external QR library needed. LVGL 8.x bundles nayuki's qrcodegen.c/h
    ; inside src/extra/libs/qrcode/ and compiles it as part of the library.
    ; ricmoo/QRCode was removed — it uses a different API (qrcode.h / qrcode_initBytes)
    ; and is incompatible with LVGL's internal lv_qrcode widget which calls qrcodegen_*.
