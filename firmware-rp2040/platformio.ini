; platformio.ini — TurboUSD Node firmware (RP2040 side, buzzer only)
;
; This chip has exactly one job: receive short commands over UART from the
; ESP32-S3 and drive the MLT-8530 buzzer accordingly. No WiFi, no Supabase,
; no clock logic -- see PROTOCOL.md for why that split exists.

[env:rp2040_buzzer]
platform = raspberrypi
board = seeed_xiao_rp2040   ; closest generic profile; pin mapping for the
                             ; actual SenseCAP D1 RP2040 wiring is in
                             ; include/board_pins.h
framework = arduino

monitor_speed = 115200

build_flags =
    -D FIRMWARE_VERSION=\"0.1.0\"
