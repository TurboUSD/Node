# .github/workflows/build-and-release-firmware.yml
#
# Triggered on every push to main that touches either firmware directory.
# Compiles both chips' firmware with PlatformIO, publishes the resulting
# .bin files as a GitHub Release, and then registers that release with
# Supabase so devices doing their daily OTA check can find it (see
# backend/functions/latest-firmware and ota_updater.h on the device side).
#
# Required repo secrets:
#   SUPABASE_URL              - https://YOUR-PROJECT-REF.supabase.co
#   SUPABASE_ANON_KEY         - anon/public key (safe to bake into firmware; RLS limits what it can do)
#   SUPABASE_SERVICE_ROLE_KEY - service role key (server-side only, never baked into firmware)

name: Build and Release Firmware

on:
  push:
    branches: [main]
    paths:
      - 'firmware-esp32/**'
      - 'firmware-rp2040/**'
      - '.github/workflows/build-and-release-firmware.yml'
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

# The publish-release job uses softprops/action-gh-release to create a Release.
# Creating releases / uploading assets requires the workflow's GITHUB_TOKEN to
# have write access to repo contents. Without this block the token is read-only
# and the step fails with "Resource not accessible by integration".
# (If it still fails, also check Settings → Actions → General → Workflow
# permissions is set to "Read and write".)
permissions:
  contents: write

jobs:
  build-esp32:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Inject Supabase credentials into config.h
        run: |
          PROJECT_REF=$(echo "${{ secrets.SUPABASE_URL }}" | sed 's|https://||' | sed 's|\.supabase\.co||')
          sed -i "s|YOUR-PROJECT-REF|${PROJECT_REF}|g" firmware-esp32/include/config.h
          sed -i "s|YOUR-SUPABASE-ANON-KEY|${{ secrets.SUPABASE_ANON_KEY }}|g" firmware-esp32/include/config.h

      - name: Build ESP32-S3 firmware
        working-directory: firmware-esp32
        run: pio run

      - name: Extract version from platformio.ini
        id: extract_version
        working-directory: firmware-esp32
        run: |
          VERSION=$(grep -oP 'FIRMWARE_VERSION=\\"\K[^\\]+' platformio.ini)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(sha256sum firmware-esp32/.pio/build/sensecap_indicator_d1/firmware.bin | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Package release binaries (OTA app image + web-flasher factory image)
        run: |
          pip install "esptool>=4,<5" --quiet   # 4.x keeps the merge_bin / --flash_* syntax used below
          BUILD=firmware-esp32/.pio/build/sensecap_indicator_d1
          BOOT_APP0=$(find ~/.platformio/packages/framework-arduinoespressif32 -name boot_app0.bin | head -1)

          # 1) OTA image = the bare app binary. The device's OTA updater (Update.h)
          #    writes this to the inactive app slot, so it must stay app-only.
          cp $BUILD/firmware.bin esp32s3-${{ steps.extract_version.outputs.version }}.bin

          # 2) Web-flasher image = a FULL factory image (bootloader + partition
          #    table + otadata + app) starting at flash address 0x0. esp-web-tools
          #    writes the manifest's part verbatim at offset 0, so it must be the
          #    whole image — shipping the bare app here (the previous bug) put the
          #    app where the bootloader belongs, causing "SHA-256 comparison failed"
          #    and a TG0WDT/RTCWDT boot loop (black screen). Offsets match
          #    firmware-esp32/partitions.csv.
          python -m esptool --chip esp32s3 merge_bin -o firmware-esp32s3.bin \
            --flash_mode dio --flash_size 8MB \
            0x0     "$BUILD/bootloader.bin" \
            0x8000  "$BUILD/partitions.bin" \
            0xe000  "$BOOT_APP0" \
            0x10000 "$BUILD/firmware.bin"

      - name: Update manifest version
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" firmware-esp32/manifest.json

      - uses: actions/upload-artifact@v4
        with:
          name: esp32s3-firmware
          path: |
            esp32s3-${{ steps.extract_version.outputs.version }}.bin
            firmware-esp32s3.bin
            firmware-esp32/manifest.json

      - name: Save sha for downstream job
        run: echo "${{ steps.sha.outputs.sha256 }}" > esp32s3-sha256.txt
      - uses: actions/upload-artifact@v4
        with:
          name: esp32s3-sha256
          path: esp32s3-sha256.txt

  build-rp2040:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build RP2040 firmware
        working-directory: firmware-rp2040
        run: pio run

      - name: Extract version from platformio.ini
        id: extract_version
        working-directory: firmware-rp2040
        run: |
          VERSION=$(grep -oP 'FIRMWARE_VERSION=\\"\K[^\\]+' platformio.ini)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256
        id: sha
        run: |
          # earlephilhower/arduino-pico outputs a .uf2 (drag-and-drop flashable)
          SHA=$(sha256sum firmware-rp2040/.pio/build/rp2040_buzzer/firmware.uf2 | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Rename UF2 for release
        run: cp firmware-rp2040/.pio/build/rp2040_buzzer/firmware.uf2 rp2040-${{ steps.extract_version.outputs.version }}.uf2

      - uses: actions/upload-artifact@v4
        with:
          name: rp2040-firmware
          path: rp2040-${{ steps.extract_version.outputs.version }}.uf2

      - name: Save sha for downstream job
        run: echo "${{ steps.sha.outputs.sha256 }}" > rp2040-sha256.txt
      - uses: actions/upload-artifact@v4
        with:
          name: rp2040-sha256
          path: rp2040-sha256.txt

  publish-release:
    needs: [build-esp32, build-rp2040]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: esp32s3-firmware, path: ./artifacts }
      - uses: actions/download-artifact@v4
        with: { name: esp32s3-sha256, path: ./artifacts }
      - uses: actions/download-artifact@v4
        with: { name: rp2040-firmware, path: ./artifacts }
      - uses: actions/download-artifact@v4
        with: { name: rp2040-sha256, path: ./artifacts }

      - name: Create GitHub Release with both binaries
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: fw-${{ needs.build-esp32.outputs.version }}-${{ github.run_number }}
          files: |
            artifacts/esp32s3-*.bin
            artifacts/firmware-esp32s3.bin
            artifacts/firmware-esp32/manifest.json
            artifacts/rp2040-*.uf2
          generate_release_notes: true

      - name: Register release with Supabase
        run: |
          ESP32_SHA=$(cat artifacts/esp32s3-sha256.txt)
          RP2040_SHA=$(cat artifacts/rp2040-sha256.txt)
          ESP32_URL=$(ls artifacts/esp32s3-*.bin | xargs -I{} basename {})
          RP2040_URL=$(ls artifacts/rp2040-*.uf2 | xargs -I{} basename {})

          curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/firmware_releases" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"target\":\"esp32s3\",\"version\":\"${{ needs.build-esp32.outputs.version }}\",\"binary_url\":\"https://github.com/${{ github.repository }}/releases/download/${{ steps.release.outputs.tag_name }}/$ESP32_URL\",\"sha256\":\"$ESP32_SHA\"}"

          curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/firmware_releases" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"target\":\"rp2040\",\"version\":\"${{ needs.build-rp2040.outputs.version }}\",\"binary_url\":\"https://github.com/${{ github.repository }}/releases/download/${{ steps.release.outputs.tag_name }}/$RP2040_URL\",\"sha256\":\"$RP2040_SHA\"}"
